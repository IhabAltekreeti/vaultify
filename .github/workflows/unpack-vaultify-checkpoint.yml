name: Unpack Vaultify checkpoint

on:
  push:
    branches:
      - vaultify-v3-rebuild
    paths:
      - .checkpoint/READY

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Check out rebuild branch
        uses: actions/checkout@v4
        with:
          ref: vaultify-v3-rebuild
          fetch-depth: 0

      - name: Rebuild checkpoint archive
        shell: bash
        run: |
          set -euo pipefail
          cat .checkpoint/part_* > /tmp/vaultify-checkpoint.b64
          base64 --decode /tmp/vaultify-checkpoint.b64 > /tmp/vaultify-checkpoint.zip
          rm -rf /tmp/vaultify-checkpoint
          mkdir -p /tmp/vaultify-checkpoint
          unzip -q /tmp/vaultify-checkpoint.zip -d /tmp/vaultify-checkpoint

      - name: Replace branch contents with modular project
        shell: bash
        run: |
          set -euo pipefail
          shopt -s dotglob
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/vaultify-checkpoint/vaultify-v3-rebuild/. .
          rm -rf .checkpoint

      - name: Commit extracted project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import modular Vaultify v3 checkpoint" || exit 0
          git push origin vaultify-v3-rebuild
